<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Global site tag (gtag.js) - Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=UA-158873779-2"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "UA-158873779-2");
    </script>

    <title>YANDHI</title>
    <link rel="icon" href="songs/cover.png" />

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Inter:wght@300;400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v5.7.0/css/all.css"
      integrity="sha384-lZN37f5QGtY3VHgisS14W3ExzMWZxybE1SJSEsQp9S+oqd12jhcu+A56Ebc1zFSJ"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" type="text/css" href="index.css" />
    <script src="index.js" defer></script>
  </head>

  <body>
    <div class="app-container">
      <!-- Player Card -->
      <div class="player-card">
        <div class="album-label">YANDHI</div>

        <div class="album-section">
          <div class="album-glow" id="album-glow"></div>
          <img src="songs/cover.png" class="album-art" id="album-art" alt="YANDHI Cover" />
        </div>

        <div class="track-info">
          <div class="track-title" id="curr-track">Selah</div>
          <div class="artist-name">Kanye West</div>
        </div>

        <div class="progress-section">
          <input type="range" class="progress-bar" id="progress-bar" value="0" min="0" max="100" step="0.1" />
          <div class="time-display">
            <span id="current-time">0:00</span>
            <span id="total-time">0:00</span>
          </div>
        </div>

        <div class="controls">
          <button class="ctrl-btn side-btn" id="prev-btn" aria-label="Previous">
            <i class="fas fa-step-backward"></i>
          </button>
          <button class="ctrl-btn play-btn" id="play-btn" aria-label="Play/Pause">
            <i class="fas fa-play" id="play-icon"></i>
          </button>
          <button class="ctrl-btn side-btn" id="next-btn" aria-label="Next">
            <i class="fas fa-step-forward"></i>
          </button>
        </div>
      </div>

      <!-- Playlist -->
      <div class="playlist-container">
        <div class="playlist-header">TRACKLIST</div>
        <div class="playlist" id="playlist"></div>
      </div>
    </div>

    <audio id="main-audio"></audio>
  </body>
</html>
